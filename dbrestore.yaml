version: 1
defaults:
  output_dir: ./backups
  log_dir: ./logs
  compression: gzip
  retention:
    max_age_days: 1
storage: {}
profiles:
  postgres_local:
    db_type: postgres
    database: dbrestoring
    host: localhost
    port: 5432
    username: testuser
    password: '123'
    compression: false
    schedule:
      preset: hourly
      persistent: true
    verification:
      target_profile: postgres_verify
      schedule_after_backup: true
  postgres_verify:
    db_type: postgres
    database: test
    host: localhost
    port: 5432
    username: testuser
    password: '123'
    compression: true
    schedule:
      preset: hourly
      persistent: true
    verification:
      target_profile: postgres_local
      schedule_after_backup: true

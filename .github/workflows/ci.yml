name: CI

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - "*.md"
      - ".gitignore"
      - "LICENSE"
      - "docs/**"
      - "*.yaml"
      - "!.github/**"
  pull_request:
    paths-ignore:
      - "*.md"
      - ".gitignore"
      - "LICENSE"
      - "docs/**"
      - "*.yaml"
      - "!.github/**"

jobs:
  quality:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run quality suite
        run: make check

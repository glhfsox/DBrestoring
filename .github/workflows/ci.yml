name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  quality:
    #well since now we support linux only.. 
    runs-on: ubuntu-latest  
    

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: python -m ruff check .

      - name: Ruff format check
        run: python -m ruff format --check .

      - name: Basedpyright
        run: python -m basedpyright

      - name: Pytest
        run: python -m pytest
